<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools — StrikeR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="assets/SP Bolt 400x400.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="StrikeR">
</head>
<body>
<div class="container">
    <div class="nav-header">
        <button class="nav-button back-button" onclick="location.href='index.html'">← Home</button>
        <button class="nav-button" onclick="location.href='reports.html'">Reports</button>
    </div>
    <h1>Tools</h1>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-top:20px;">

        <!-- Site Drawing — Available -->
        <div onclick="location.href='drawing.html'"
             style="background:white;border:2px solid #0877c3;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(8,119,195,0.1);"
             onmouseover="this.style.transform='translateY(-3px)';this.style.background='#f0f8ff'"
             onmouseout="this.style.transform='';this.style.background='white'">
            <div style="font-size:2.2em;margin-bottom:10px;">🖊️</div>
            <div style="font-size:1.1em;font-weight:700;color:#0d1b2a;margin-bottom:8px;">Site Drawing</div>
            <div style="font-size:0.85em;color:#6c757d;">Create site plans and lightning protection layout drawings</div>
        </div>

        <!-- Separation Distance — Available -->
        <div onclick="location.href='separation-distance.html'"
             style="background:white;border:2px solid #0877c3;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(8,119,195,0.1);"
             onmouseover="this.style.transform='translateY(-3px)';this.style.background='#f0f8ff'"
             onmouseout="this.style.transform='';this.style.background='white'">
            <div style="font-size:2.2em;margin-bottom:10px;">📏</div>
            <div style="font-size:1.1em;font-weight:700;color:#0d1b2a;margin-bottom:8px;">Separation Distance</div>
            <div style="font-size:0.85em;color:#6c757d;">Calculate required separation distances to BS EN IEC 62305-3</div>

    </div>
</div>
</body>
</html>
