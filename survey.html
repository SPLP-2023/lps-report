    <!-- ===================== SITE INFORMATION ===================== -->

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
            .then(r => console.log('SW registered:', r.scope))
            .catch(e => console.log('SW failed:', e));
    }

    async function blobToBase64(blob) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    }

    async function preloadBrandingImages() {
        try {
            const [logoBlob, footerBlob] = await Promise.all([
                fetch('./assets/Color logo - no background (px reduction).png').then(r => r.blob()),
                fetch('./assets/es12nobackground.png').then(r => r.blob())
            ]);
            window._logoBase64   = await blobToBase64(logoBlob);
            window._footerBase64 = await blobToBase64(footerBlob);
        } catch(e) {
            console.error('Failed to preload branding images:', e);
        }
    }

    preloadBrandingImages();
</script>

<script>
// ===================== COLLAPSIBLE SECTIONS =====================
const SURVEY_SECTION_IDS = ['sec-site','sec-photos','sec-structure','sec-lp','sec-risk','sec-electrical','sec-observations'];

const SURVEY_SECTION_FIELDS = {
    'sec-site':         ['siteName','jobReference','siteAddress','surveyDate','surveyorName','clientRepName'],
    'sec-photos':       [],
    'sec-structure':    ['structureType','structureHeight','buildingAge','numberOfFloors','numberOfOccupants','hasBasement','roofType','roofAccess'],
    'sec-lp':           ['existingSystem','systemCondition','lastTested','standardInstalled'],
    'sec-risk':         [],
    'sec-electrical':   [],
    'sec-observations': ['surveyFindings']
};

function toggleSection(id) {
    const section = document.getElementById(id);
    const body = section.querySelector('.section-body');
    const chevron = section.querySelector('.chevron');
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    chevron.textContent = isOpen ? '▾' : '▴';
    section.classList.toggle('expanded', !isOpen);
    const state = JSON.parse(localStorage.getItem('striker-survey-sections') || '{}');
    state[id] = !isOpen;
    localStorage.setItem('striker-survey-sections', JSON.stringify(state));
}

function restoreSectionStates() {
    const state = JSON.parse(localStorage.getItem('striker-survey-sections') || '{}');
    SURVEY_SECTION_IDS.forEach(id => {
        const section = document.getElementById(id);
        if (!section) return;
        const body = section.querySelector('.section-body');
        const chevron = section.querySelector('.chevron');
        const open = state[id] === true;
        body.classList.toggle('open', open);
        chevron.textContent = open ? '▴' : '▾';
        section.classList.toggle('expanded', open);
    });
}

function updateStatusDot(sectionId) {
    const dot = document.getElementById('dot-' + sectionId);
    if (!dot) return;
    const fields = SURVEY_SECTION_FIELDS[sectionId] || [];
    let filled = fields.some(id => {
        const el = document.getElementById(id);
        return el && el.value && el.value.trim() !== '';
    });
    // Checkbox sections
    if (sectionId === 'sec-risk') {
        filled = document.querySelectorAll('.risk-checkbox:checked').length > 0;
    }
    if (sectionId === 'sec-electrical') {
        filled = document.querySelectorAll('.electrical-checkbox:checked').length > 0;
    }
    if (sectionId === 'sec-lp') {
        filled = filled || document.querySelectorAll('.system-checkbox:checked').length > 0;
    }
    if (sectionId === 'sec-structure') {
        filled = filled
            || document.querySelectorAll('.ground-checkbox:checked').length > 0
            || document.querySelectorAll('.wall-checkbox:checked').length > 0;
    }
    if (sectionId === 'sec-photos') {
        filled = !!uploadedImages['buildingImagePreview_data'] || !!uploadedImages['additionalPhotosPreview_data'];
    }
    dot.classList.toggle('dot-filled', filled);
    dot.classList.toggle('dot-empty', !filled);
}

function updateAllDots() {
    SURVEY_SECTION_IDS.forEach(updateStatusDot);
}

document.addEventListener('DOMContentLoaded', () => {
    restoreSectionStates();
    document.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('change', updateAllDots);
        el.addEventListener('input', updateAllDots);
    });
    updateAllDots();
});
</script>
